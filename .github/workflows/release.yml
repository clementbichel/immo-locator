name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Build extension
        run: npm run build

      - name: Create extension zip
        run: |
          mkdir -p dist
          zip -r dist/leboncoin-extension-${{ github.ref_name }}.zip \
            manifest.json \
            popup.html \
            popup.js \
            icons/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/leboncoin-extension-${{ github.ref_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
