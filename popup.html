<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 400px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 16px;
            margin: 0;
            background-color: #f4f6f8;
        }

        h1 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 16px;
            color: #1a1a1a;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #f0f0f0;
        }

        .data-row:last-child {
            border-bottom: none;
        }

        .label {
            font-weight: 600;
            color: #555;
        }

        .value {
            font-weight: 400;
            color: #1a1a1a;
        }

        .error {
            color: #d32f2f;
            font-style: italic;
            margin-bottom: 12px;
        }

        button {
            margin-top: 16px;
            background-color: #ec5a13;
            /* Leboncoin orange-ish */
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 14px;
        }

        button:hover {
            background-color: #d84d0b;
        }
    </style>
</head>

<body>
    <h1>Détails du bien</h1>
    <div id="content">
        <div class="data-row">
            <span class="label">Surface habitable :</span>
            <span class="value" id="surface">Chargement...</span>
        </div>
        <div class="data-row">
            <span class="label">Surface terrain :</span>
            <span class="value" id="terrain">Chargement...</span>
        </div>
        <div class="data-row">
            <span class="label">DPE :</span>
            <span class="value" id="dpe">Chargement...</span>
        </div>
        <div class="data-row">
            <span class="label">GES :</span>
            <span class="value" id="ges">Chargement...</span>
        </div>
        <div class="data-row">
            <span class="label">Date diagnostic :</span>
            <span class="value" id="date_diag">Chargement...</span>
        </div>
        <div class="data-row">
            <span class="label">Conso. primaire :</span>
            <span class="value" id="conso_prim">Chargement...</span>
        </div>
        <div class="data-row">
            <span class="label">Conso. finale :</span>
            <span class="value" id="conso_fin">Chargement...</span>
        </div>
    </div>
    <div id="error-msg" class="error" style="display: none;"></div>
    <button id="copy-btn">Copier les détails</button>
    <script src="popup.js"></script>
</body>

</html>
