<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 400px;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        scrollbar-gutter: stable both-edges;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        padding: 16px;
        background-color: #f4f6f8;
      }

      h1 {
        font-size: 18px;
        margin-top: 0;
        margin-bottom: 16px;
        color: #1a1a1a;
        border-bottom: 1px solid #eee;
        padding-bottom: 8px;
      }

      .data-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid #f0f0f0;
      }

      .data-row:last-child {
        border-bottom: none;
      }

      .label {
        font-weight: 600;
        color: #555;
      }

      .value {
        font-weight: 400;
        color: #1a1a1a;
      }

      .error {
        color: #d32f2f;
        font-style: italic;
        margin-bottom: 12px;
      }

      button {
        margin-top: 16px;
        background-color: #ec5a13;
        /* Leboncoin orange-ish */
        color: white;
        border: none;
        padding: 10px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
        font-size: 14px;
      }

      button:hover {
        background-color: #d84d0b;
      }
    </style>
  </head>

  <body>
    <div id="data-container">
      <h1>Détails de l'annonce</h1>
      <div class="data-row">
        <span class="label">Ville</span>
        <span class="value" id="city">Chargement...</span>
      </div>
      <div class="data-row">
        <span class="label">Code Postal</span>
        <span class="value" id="zipcode">Chargement...</span>
      </div>
      <div class="data-row">
        <span class="label">Surface</span>
        <span class="value" id="surface">--</span>
      </div>
      <div class="data-row">
        <span class="label">Terrain</span>
        <span class="value" id="terrain">--</span>
      </div>
      <div class="data-row">
        <span class="label">DPE</span>
        <span class="value" id="dpe">--</span>
      </div>
      <div class="data-row">
        <span class="label">GES</span>
        <span class="value" id="ges">--</span>
      </div>
      <div class="data-row">
        <span class="label">Date Diag</span>
        <span class="value" id="date_diag">--</span>
      </div>
      <div class="data-row">
        <span class="label">Conso. Primaire</span>
        <span class="value" id="conso_prim">--</span>
      </div>
      <div class="data-row">
        <span class="label">Conso. Finale</span>
        <span class="value" id="conso_fin">--</span>
      </div>
    </div>

    <div id="ademe-section" style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #eee">
      <div
        id="ademe-params"
        style="margin-bottom: 10px; font-size: 0.9em; color: #555; display: none"
      >
        <strong>Paramètres de recherche :</strong>
        <ul id="params-list" style="padding-left: 20px; margin: 5px 0"></ul>
      </div>

      <button
        id="search-ademe-btn"
        style="
          display: none;
          width: 100%;
          margin-bottom: 10px;
          background-color: #2c3e50;
          color: white;
          border: none;
          padding: 8px;
          border-radius: 4px;
          cursor: pointer;
        "
      >
        Lancer la recherche
      </button>

      <div id="ademe-loading" style="display: none; color: #666; font-style: italic">
        Recherche en cours...
      </div>
      <div id="ademe-results" style="font-size: 0.9em"></div>
    </div>

    <div id="error-msg" class="error" style="display: none"></div>
    <script src="popup.js"></script>
  </body>
</html>
